name: Deploy ec2-new

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: ec2-new

jobs:
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Check existing EC2
        id: check_ec2
        run: |
          EXISTING_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=${{ secrets.PROJECT_NAME }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text 2>/dev/null || echo "None")
          if [ "$EXISTING_IP" != "None" ] && [ "$EXISTING_IP" != "null" ] && [ -n "$EXISTING_IP" ]; then
            echo "exists=true"  >> $GITHUB_OUTPUT
            echo "ip=$EXISTING_IP" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create S3 state bucket
        if: steps.check_ec2.outputs.exists != 'true'
        run: aws s3 mb s3://devops-agent-tfstate --region us-east-1 2>/dev/null || true

      - name: Terraform Init
        if: steps.check_ec2.outputs.exists != 'true'
        run: terraform init
        working-directory: terraform

      - name: Terraform Plan
        if: steps.check_ec2.outputs.exists != 'true'
        run: terraform plan -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        if: steps.check_ec2.outputs.exists != 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

      - name: Get IP
        id: get_ip
        run: |
          if [ "${{ steps.check_ec2.outputs.exists }}" == "true" ]; then
            echo "ip=${{ steps.check_ec2.outputs.ip }}" >> $GITHUB_OUTPUT
          else
            echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
          fi
        working-directory: terraform

  configure:
    name: Configure Server
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible

      - name: Write SSH private key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Wait for SSH
        run: |
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/ssh_key ubuntu@${{ needs.provision.outputs.server_ip }} echo ok \
              && break || sleep 10
          done

      - name: Run Ansible Playbook
        run: |
          ansible-playbook \
            -i "${{ needs.provision.outputs.server_ip }}," \
            --private-key /tmp/ssh_key \
            -u ubuntu \
            ansible/playbook.yml

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/ssh_key

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Health check HTTP
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "Running health check against http://${SERVER_IP}"
          for i in $(seq 1 10); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://${SERVER_IP} || echo "000")
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
              echo "Health check passed with HTTP status ${HTTP_STATUS}"
              exit 0
            fi
            echo "Attempt $i: HTTP status ${HTTP_STATUS}, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Verify SSH connectivity
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -i /tmp/ssh_key ubuntu@${{ needs.provision.outputs.server_ip }} \
            "echo 'SSH verification successful' && uptime"
          rm -f /tmp/ssh_key

  notify:
    name: Notify Live URL
    runs-on: ubuntu-latest
    needs: [provision, configure, verify]
    if: always()
    steps:
      - name: Print deployment summary
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          echo "========================================"
          echo "  Deployment Summary — ec2-new"
          echo "========================================"
          echo "  Project   : ec2-new"
          echo "  Region    : us-east-1"
          echo "  Server IP : ${SERVER_IP}"
          echo "  Live URL  : http://${SERVER_IP}"
          echo "  HTTPS URL : https://${SERVER_IP}"
          echo "  Status    : ${{ needs.verify.result }}"
          echo "  Triggered : ${{ github.event_name }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "  Actor     : ${{ github.actor }}"
          echo "========================================"

      - name: Set final status
        run: |
          if [ "${{ needs.verify.result }}" == "success" ]; then
            echo "Deployment completed successfully."
            exit 0
          else
            echo "Deployment finished with status: ${{ needs.verify.result }}"
            exit 1
          fi